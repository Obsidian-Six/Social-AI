services:
  react-frontend:
    build:
      context: ./Frontend  # <--- Points to your folder
      dockerfile: Dockerfile
    container_name: react-app-new
    restart: unless-stopped
    networks:
      - traefik  # Connects to your existing Traefik network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react-app.rule=Host(`yourdomain.com`)"
      - "traefik.http.routers.react-app.entrypoints=websecure"
      - "traefik.http.routers.react-app.tls=true"
      - "traefik.http.routers.react-app.tls.certresolver=myresolver"
      - "traefik.http.services.react-app.loadbalancer.server.port=80"

networks:
  traefik:
    external: true 